appId: com.almanac.app
productName: Almanac
directories:
  output: release
files:
  - dist/**/*
  - dist-electron/**/*
  - package.json
extraResources:
  # Compiled Python binaries (built by scripts/build-macos.sh via PyInstaller)
  - from: build/scripts/
    to: scripts/
    filter:
      - "**/*"
mac:
  icon: build/icon.icns
  category: public.app-category.developer-tools
  artifactName: "${productName}-${version}-mac-${arch}.${ext}"
  target:
    - dmg
    - zip
win:
  icon: build/icon.ico
  artifactName: "${productName}-${version}-win-${arch}.${ext}"
  target:
    - target: nsis
      arch: [x64]
    - target: zip
      arch: [x64]
linux:
  icon: build/icon.png
  artifactName: "${productName}-${version}-linux-${arch}.${ext}"
  category: Development
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
