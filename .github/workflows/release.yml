name: Release macOS

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (e.g., 1.2.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - arch: arm64
            pyinstaller_arch: ""
          - arch: x64
            pyinstaller_arch: "arch -x86_64"
    runs-on: macos-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install PyInstaller
        run: pip install pyinstaller

      - name: Stamp version in package.json
        run: npm version ${{ inputs.version }} --no-git-tag-version

      - name: Install Node dependencies
        run: npm ci

      - name: Compile Python scripts
        run: |
          WORK=".pyinstaller-work"
          DIST=".pyinstaller-dist"
          rm -rf "$WORK" "$DIST"
          mkdir -p "$WORK" "$DIST" build/scripts

          ${{ matrix.pyinstaller_arch }} python3 -m PyInstaller \
            --onefile --clean --name parse_manifest \
            --distpath "$DIST" --workpath "$WORK/parse_manifest" \
            --specpath "$WORK" --log-level WARN \
            scripts/parse_manifest.py

          ${{ matrix.pyinstaller_arch }} python3 -m PyInstaller \
            --onefile --clean --name scan_airflow_dags \
            --paths scripts --hidden-import dbt_select \
            --distpath "$DIST" --workpath "$WORK/scan_airflow_dags" \
            --specpath "$WORK" --log-level WARN \
            scripts/scan_airflow_dags.py

          cp "$DIST/parse_manifest" build/scripts/
          cp "$DIST/scan_airflow_dags" build/scripts/
          rm -rf "$WORK" "$DIST"

      - name: Build frontend and Electron
        run: npm run build

      - name: Package macOS app
        run: npx electron-builder --mac --${{ matrix.arch }}
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.arch }}
          path: |
            release/*.dmg
            release/*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: Download arm64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-arm64
          path: artifacts/

      - name: Download x64 artifacts
        uses: actions/download-artifact@v4
        with:
          name: build-x64
          path: artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: Almanac v${{ inputs.version }}
          generate_release_notes: true
          files: artifacts/**/*
